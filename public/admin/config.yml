backend:
  name: git-gateway
  site_domain: bright-brigadeiros-6a1fe4.netlify.app
  branch: main
publish_mode: editorial_workflow
media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "menu"
    label: "Menu"
    files:
      - file: "src/data/menu.json"
        label: "Lista dań"
        name: "items"
        fields:
          - { label: "Nazwa", name: "name", widget: "string" }
          - { label: "Cena", name: "price", widget: "string" }
