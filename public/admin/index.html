<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script>
  // Ten blok MUSI być przed ładowaniem decap-cms.js
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", user => {
      if (!user) {
        window.netlifyIdentity.on("login", () => {
          document.location.href = "/admin/";
        });
      }
    });
  }

  // Wymuszamy adres Netlify przy każdej próbie otwarcia okna
  document.addEventListener('mousedown', function () {
    if (window.localStorage && !window.localStorage.getItem('netlifySiteURL')) {
      window.localStorage.setItem('netlifySiteURL', 'https://bright-brigadeiros-6a1fe4.netlify.app');
    }
  });
</script>
<script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
